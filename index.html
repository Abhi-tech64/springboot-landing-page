<!DOCTYPE html>
<html>
<head>
    <title>My Landing Page</title>
    <link rel="stylesheet" href="style.css">
</head>

<body>

<header>
    <h1>Welcome to My Website</h1>
    <p>Full Stack Java Development Project</p>
</header>

<section class="about">
    <h2>About</h2>
    <p>This is my first Full Stack project using HTML, CSS and Spring Boot.</p>
</section>

<section class="contact">
    <h2>Contact Us</h2>

    <form action="http://localhost:8080/contact" method="POST">

        <label>Name</label>
        <input type="text" name="name" required>

        <label>Email</label>
        <input type="email" name="email" required>

        <label>Message</label>
        <textarea name="message" required></textarea>

        <button type="submit">Send Message</button>

    </form>

</section>

<footer>
    <p>© 2026 My Landing Page</p>
</footer>

</body>
</html>
